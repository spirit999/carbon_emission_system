name: carbon_emission_system

services:
  # 智能问答微服务（Python）
  ai-qa:
    build:
      context: ../ai-qa-service
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
        COPY . .
        EXPOSE 8000
        CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    image: carbon-ai-qa:latest
    container_name: carbon-ai-qa
    restart: always
    ports:
      - "8000:8000"
    networks:
      - carbon-network
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
      BACKEND_BASE_URL: http://carbon-backend:8080/api
      # 回答中对外展示的下载/接口地址
      PUBLIC_BACKEND_BASE_URL: http://bjfucarbon.com/api
      # 大模型与向量检索配置直接写在本文件
      LLM_ENABLED: "true"
      LLM_BASE_URL: https://open.bigmodel.cn/api/paas/v4/chat/completions
      # 部署时请填写智谱开放平台 API Key
      LLM_API_KEY: ""
      LLM_MODEL: glm-4.5-air
      LLM_MAX_TOKENS: "2048"
      EMBEDDING_ENABLED: "true"
      EMBEDDING_BASE_URL: https://open.bigmodel.cn/api/paas/v4/embeddings
      EMBEDDING_MODEL: embedding-2
      VECTOR_TOP_K: "3"
      VECTOR_CACHE_TTL: "300"

  # 前端服务
  frontend:
    image: nginx:1.20-alpine
    container_name: carbon-frontend
    restart: always
    ports:
      - "80:8080"
    networks:
      - carbon-network
    depends_on:
      - backend
      - ai-qa
    volumes:
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    environment:
      TZ: Asia/Shanghai

  # 后端服务
  backend:
    image: tomcat:9.0-jdk8-openjdk
    container_name: carbon-backend
    restart: always
    ports:
      - "12306:8080"
    networks:
      - carbon-network
    depends_on:
      - mysql
      - redis
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sys_carbon?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      # 智能问答代理（AiQaProxyController）转发目标，与 ai-qa 容器名一致
      AI_QA_BASE_URL: http://carbon-ai-qa:8000
      # 字体文件路径环境变量（容器内路径，用于PDF导出，代码会优先从此路径读取字体文件）
      FONT_DIR: /app/fonts
    volumes:
      # 将war包挂载为api.war，Tomcat会部署到/api路径
      - ./backend/sys_carbon-0.0.1-SNAPSHOT.war:/usr/local/tomcat/webapps/api.war
      # 绑定字体文件目录（相对路径，只读）,供PDF导出使用
      - ./backend/fonts:/app/fonts:ro
    # 确保Tomcat启动后正确部署
    command: >
      bash -c "rm -rf /usr/local/tomcat/webapps/ROOT && rm -rf /usr/local/tomcat/webapps/api && catalina.sh run"

  # Redis服务（用于限流和缓存）
  redis:
    image: redis:7
    container_name: carbon-redis
    restart: always
    ports:
      - "4439:6379"
    networks:
      - carbon-network
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass 123456
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # 数据库服务
  mysql:
    image: mysql:8.0
    container_name: carbon-mysql
    restart: always
    ports:
      - "4436:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: sys_carbon # 容器启动时会自动创建该数据库
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      # 容器启动时，会自动执行 /docker-entrypoint-initdb.d/ 目录下的 SQL 文件
      - ./sql:/docker-entrypoint-initdb.d
      # MySQL 数据持久化
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --lower_case_table_names=1
      - --init-connect='SET NAMES utf8mb4'
    networks:
      - carbon-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  carbon-network:
    driver: bridge


